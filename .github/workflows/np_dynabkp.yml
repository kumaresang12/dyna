name: Dynatrace Configuration Backup and upload in Azure Blob storage 
'on':
    workflow_dispatch:

env:
  TF_WORKING_DIR: terraform/nonprod
  EXPORT_DIR: dynatrace_backup

jobs:
  dynatrace-backup:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository 
        uses: actions/checkout@v4

      - name: Install unzip
        run: |
          if ! command -v unzip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y unzip
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Verify Terraform Version
        run: |
          terraform version

      - name: Initiate Terraform using terraform init 
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          DYNATRACE_API_URL: ${{ secrets.DYNATRACE_API_URL }}
          DYNATRACE_API_TOKEN: ${{ secrets.DYNATRACE_API_TOKEN }}
          DT_ACCOUNT_ID: ${{ secrets.DT_ACCOUNT_ID }}
        run: |
          terraform init

      - name: Run the planning of terraform code
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          DYNATRACE_API_URL: ${{ secrets.DYNATRACE_API_URL }}
          DYNATRACE_API_TOKEN: ${{ secrets.DYNATRACE_API_TOKEN }}
          DT_ACCOUNT_ID: ${{ secrets.DT_ACCOUNT_ID }}
        run: |
          terraform plan

      - name: Apply the terraform code
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          DYNATRACE_API_URL: ${{ secrets.DYNATRACE_API_URL }}
          DYNATRACE_API_TOKEN: ${{ secrets.DYNATRACE_API_TOKEN }}
          DT_ACCOUNT_ID: ${{ secrets.DT_ACCOUNT_ID }}
        run: |
          terraform apply -auto-approve

      - name: Capture export dir and timestamp from terraform outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          EXPORT_DIR=$(terraform output -raw export_dir)
          TIMESTAMP=$(terraform output -raw timestamp)
          echo "EXPORT_DIR=$EXPORT_DIR" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
         
      - name: Create Archive of the backup to upload into Azure blob
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          BACKUP_FILE="dynatrace-config-${TIMESTAMP}.tar.gz"
          #tar -czf "$BACKUP_FILE" -C "$EXPORT_DIR"
          tar -czf "$BACKUP_FILE" "$EXPORT_DIR"/modules/*
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV
