name: Non-Prod Dynatrace Configuration Backup and tar locally
'on':
    workflow_dispatch:

env:
  TF_WORKING_DIR: terraform/nonprod
  EXPORT_DIR: dynatrace_backup

jobs:
  dynatrace-backup:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository 
        uses: actions/checkout@v4

      - name: Install unzip
        run: |
          if ! command -v unzip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y unzip
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Verify Terraform Version
        run: |
          terraform version

      - name: Initiate Terraform using terraform init 
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init

      - name: Create Export Directory as dynatrace_backup
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          mkdir -p ${{ env.EXPORT_DIR }}
          pwd
          
      - name: Find the terrform-provider-dynatrace executable and Export Dynatrace Configuration using terraform-provider-dynatrace
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          DYNATRACE_ENV_URL: ${{ vars.NP_DYNATRACE_API_URL }}
          DYNATRACE_API_TOKEN: ${{ secrets.NP_DYNATRACE_API_TOKEN }}
          DT_ACCOUNT_ID: ${{ secrets.DT_ACCOUNT_ID }}
        run: |
          pwd
          export DYNATRACE_ENV_URL=$DYNATRACE_ENV_URL
          export DYNATRACE_API_TOKEN=$DYNATRACE_API_TOKEN
          export DT_ACCOUNT_ID=$DT_ACCOUNT_ID
          PROVIDER_BIN=$(find .terraform/providers/registry.terraform.io/dynatrace-oss/dynatrace \
            -type f \
            -name "terraform-provider-dynatrace*" | head -n 1)
          echo "Provider Binary: $PROVIDER_BIN"
          pwd
          #chmod +x "$PROVIDER_BIN"
          "$PROVIDER_BIN" -export
          
      - name: Capture export dir and timestamp from terraform outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          EXPORT_DIR=$(terraform output -raw export_dir)
          TIMESTAMP=$(terraform output -raw timestamp)
          echo "EXPORT_DIR=$EXPORT_DIR" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
         
      - name: Create Archive of the backup to upload into Azure blob
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          BACKUP_FILE="np-dynatrace-config-${TIMESTAMP}.tar.gz"
          #tar -czf "$BACKUP_FILE" -C "$EXPORT_DIR"
          tar -czf "$BACKUP_FILE" "$EXPORT_DIR"/modules/*
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV
